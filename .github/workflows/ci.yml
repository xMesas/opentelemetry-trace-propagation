name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: "Integration test (Testcontainers: real Jaeger, real OTLP trace export)"
        run: ./mvnw -B test -Dtest=OpenTelemetryTracePropagationIT

      - name: Package
        run: ./mvnw -B -DskipTests package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: opentelemetry-trace-propagation-jar
          path: target/opentelemetry-trace-propagation-*.jar
