services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: otel-demo-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI + query API
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
